# ─────────────────────────────────────────────────────────────
# StockSense Nginx Reverse Proxy
# ─────────────────────────────────────────────────────────────
# Unified entrypoint on port 80:
#   /       → frontend (Vite dev server at :5173)
#   /api/   → backend  (FastAPI at :8000)
#   /docs   → backend  (Swagger UI)
# ─────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:5173;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend — proxy to Vite dev server
        # WebSocket upgrade headers needed for Vite HMR
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend Swagger docs
        location /docs {
            proxy_pass http://backend;
        }

        location /openapi.json {
            proxy_pass http://backend;
        }

        # Backend redoc
        location /redoc {
            proxy_pass http://backend;
        }
    }
}
